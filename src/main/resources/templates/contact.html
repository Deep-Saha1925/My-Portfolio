<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Contact</title>
</head>
<body>

<div th:fragment="contact" id="pf-root">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* DARK */
        #pf-root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --bg-subtle: #16161f;
            --accent: #7c6af7;
            --accent-2: #c084fc;
            --accent-glow: rgba(124, 106, 247, 0.18);
            --text: #f0eff8;
            --text-muted: #8b8a9e;
            --text-dim: #4a4960;
            --border: rgba(255,255,255,0.07);
            --border-accent: rgba(124, 106, 247, 0.35);
        }

        /* LIGHT */
        #pf-root[data-theme="light"] {
            --bg: #f9f8f6;
            --bg-card: #ffffff;
            --bg-subtle: #f0eff9;
            --accent: #5b4ee0;
            --accent-2: #9b59c4;
            --accent-glow: rgba(91, 78, 224, 0.10);
            --text: #0e0e10;
            --text-muted: #4a4a58;
            --text-dim: #9a9aab;
            --border: rgba(0,0,0,0.09);
            --border-accent: rgba(91, 78, 224, 0.30);
        }

        #pf-root {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            min-height: 100vh;
        }

        /* TOGGLE */
        .theme-toggle {
            position: fixed;
            top: 1.25rem;
            right: 1.5rem;
            width: 44px;
            height: 26px;
            background: var(--bg-card);
            border: 1px solid var(--border-accent);
            border-radius: 100px;
            cursor: pointer;
        }

        .theme-toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            transition: transform 0.3s;
        }

        #pf-root[data-theme="light"] .theme-toggle-thumb {
            transform: translateX(18px);
        }

        /* LAYOUT */
        .ct-wrap {
            max-width: 700px;
            margin: auto;
            padding: 6rem 1.5rem;
        }

        /* HEADER */
        .ct-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .ct-title {
            font-size: 3rem;
            font-style: italic;
        }

        .ct-sub {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        /* FORM CARD */
        .ct-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
        }

        /* INPUTS */
        .ct-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 1rem;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.25s ease;
            caret-color: var(--accent);
        }

        .ct-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            transform: translateY(-1px);
        }

        .ct-input:hover {
            border-color: var(--border-accent);
        }

        .ct-input::placeholder {
            color: var(--text-dim);
        }

        #phone.ct-input {
            letter-spacing: 0.08em;
            font-family: 'Courier New', monospace;
        }

        textarea.ct-input {
            height: 140px;
            resize: none;
        }

        /* BUTTON */
        .ct-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            color: white;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.1em;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }

        .ct-btn:hover {
            background: var(--accent-2);
            transform: translateY(-1px);
        }

        /* MESSAGES */
        .msg {
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        .success { color: #4ade80; }
        .error { color: #f87171; }

    </style>

    <!-- THEME TOGGLE -->
    <button class="theme-toggle" id="themeToggle">
        <div class="theme-toggle-thumb"></div>
    </button>

    <section>
        <div class="ct-wrap">

            <div class="ct-header">
                <h1 class="ct-title">Get in touch.</h1>
                <p class="ct-sub">Let's build something together.</p>
            </div>

            <div class="ct-card">
                <form id="contactForm">

                    <input class="ct-input" id="name" placeholder="Full name" required />
                    <input class="ct-input" id="email" type="email" placeholder="Your Email address" required />
                    <input class="ct-input" id="phone" type="tel" placeholder="98765 43210" required />
                    <textarea class="ct-input" id="message" placeholder="Your message" required></textarea>

                    <button class="ct-btn" type="submit">Send Message →</button>

                    <div class="msg success" id="successMsg">Message sent successfully!</div>
                    <div class="msg error" id="errorMsg">Error sending message!</div>

                </form>
            </div>

        </div>
    </section>

    <script>
        // THEME TOGGLE
        (function () {
            var root = document.getElementById('pf-root');
            var btn = document.getElementById('themeToggle');

            var saved = localStorage.getItem('pf-theme');
            if (saved === 'light') root.setAttribute('data-theme', 'light');

            btn.addEventListener('click', function () {
                var isLight = root.getAttribute('data-theme') === 'light';
                if (isLight) {
                    root.removeAttribute('data-theme');
                    localStorage.setItem('pf-theme', 'dark');
                } else {
                    root.setAttribute('data-theme', 'light');
                    localStorage.setItem('pf-theme', 'light');
                }
            });
        })();

        // PHONE FORMAT
        const phoneInput = document.getElementById("phone");

        phoneInput.addEventListener("input", function () {
            let value = this.value.replace(/\D/g, "");
            if (value.length > 10) value = value.slice(0, 10);

            if (value.length > 5) {
                value = value.slice(0, 5) + " " + value.slice(5);
            }

            this.value = value;
        });

        // FORM SUBMIT
        document.getElementById("contactForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const data = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value.replace(/\s/g, ""),
                message: document.getElementById("message").value
            };

            const successMsg = document.getElementById("successMsg");
            const errorMsg = document.getElementById("errorMsg");

            const res = await fetch("/send-message", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(data)
            });

            if (res.ok) {
                successMsg.style.display = "block";
                errorMsg.style.display = "none";
                this.reset();
            } else {
                errorMsg.style.display = "block";
                successMsg.style.display = "none";
            }
        });
    </script>

</div>
</body>
</html>
